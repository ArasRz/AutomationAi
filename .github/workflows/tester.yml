name: Testautomation CI

# När ska pipelinen köras?
on:
  push:
    branches: [main]       # Vid varje push till main
  pull_request:
    branches: [main]       # Vid varje pull request mot main

jobs:

  # ─────────────────────────────────────────────
  # ENHETSTESTER — körs på ALLA pull requests och pushar
  # Snabba tester utan webbläsare, ger snabb feedback
  # ─────────────────────────────────────────────
  enhetstester:
    name: Enhetstester
    runs-on: ubuntu-latest

    steps:
      # Steg 1: Hämta ner koden från GitHub
      - name: Hämta kod
        uses: actions/checkout@v4

      # Steg 2: Installera Python
      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Steg 3: Installera beroenden
      - name: Installera beroenden
        run: pip install -r requirements.txt

      # Steg 4: Kör enhetstester och generera HTML-rapport
      - name: Kör enhetstester
        run: |
          pytest lektion3_testramverk_cicd/test_unit.py \
                 -v --html=rapport_enhet.html --self-contained-html

      # Steg 5: Publicera rapporten som artefakt
      - name: Publicera enhetstest-rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-enhetstester
          path: rapport_enhet.html


  # ─────────────────────────────────────────────
  # INTEGRATIONSTESTER — körs BARA vid push till main
  # Tyngre tester med webbläsare, körs parallellt via matrix
  # ─────────────────────────────────────────────
  integrationstester:
    name: Integrationstester (${{ matrix.test-suite }})
    runs-on: ubuntu-latest

    # Villkor: kör bara vid push till main, inte på pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        test-suite: [selenium, playwright]

    steps:
      # Steg 1: Hämta ner koden från GitHub
      - name: Hämta kod
        uses: actions/checkout@v4

      # Steg 2: Installera Python
      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Steg 3: Installera beroenden
      - name: Installera beroenden
        run: pip install -r requirements.txt

      # Steg 4: Installera Playwright-webbläsare (bara för Playwright-jobbet)
      - name: Installera Playwright-webbläsare
        if: matrix.test-suite == 'playwright'
        run: playwright install chromium

      # Steg 5a: Kör Selenium-tester och generera HTML-rapport
      - name: Kör Selenium-tester
        if: matrix.test-suite == 'selenium'
        run: |
          pytest lektion2_selenium_playwright/test_selenium_login.py \
                 lektion2_selenium_playwright/tests/test_login_pom.py \
                 -v --html=rapport_selenium.html --self-contained-html

      # Steg 5b: Kör Playwright-tester och generera HTML-rapport
      - name: Kör Playwright-tester
        if: matrix.test-suite == 'playwright'
        run: |
          pytest lektion2_selenium_playwright/test_playwright_login.py \
                 -v --html=rapport_playwright.html --self-contained-html

      # Steg 6: Publicera rapporten som artefakt
      - name: Publicera integrationstest-rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-${{ matrix.test-suite }}
          path: rapport_*.html
